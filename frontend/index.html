<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureAuth</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <header class="site-header">
      <span class="logo">⬡ SecureAuth</span>
    </header>

    <main class="card-wrap">
      <div class="card">
        <div class="tab-bar">
          <button class="tab active" id="tab-login" onclick="switchTab('login')">Log in</button>
          <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login form -->
        <form id="form-login" class="auth-form" onsubmit="handleLogin(event)">
          <h2 class="form-title">Welcome back</h2>
          <p class="form-sub">Enter your credentials to access your account.</p>

          <label class="field-label" for="login-email">Email</label>
          <input class="field" id="login-email" type="email" placeholder="you@example.com" required autocomplete="email" />

          <label class="field-label" for="login-password">Password</label>
          <input class="field" id="login-password" type="password" placeholder="••••••••" required autocomplete="current-password" />

          <div id="login-alert" class="alert hidden"></div>

          <button class="btn-primary" type="submit" id="login-btn">
            <span class="btn-text">Log in</span>
            <span class="spinner hidden" id="login-spinner"></span>
          </button>
        </form>

        <!-- Register form -->
        <form id="form-register" class="auth-form hidden" onsubmit="handleRegister(event)">
          <h2 class="form-title">Create an account</h2>
          <p class="form-sub">Start securing your identity in under a minute.</p>

          <label class="field-label" for="reg-email">Email</label>
          <input class="field" id="reg-email" type="email" placeholder="you@example.com" required autocomplete="email" />

          <label class="field-label" for="reg-password">Password</label>
          <input class="field" id="reg-password" type="password" placeholder="At least 8 characters" required autocomplete="new-password" />

          <div id="register-alert" class="alert hidden"></div>

          <button class="btn-primary" type="submit" id="register-btn">
            <span class="btn-text">Create account</span>
            <span class="spinner hidden" id="register-spinner"></span>
          </button>
        </form>
      </div>

      <p class="footnote">Built for DevSecOps practice &mdash; <a href="http://localhost:8000/docs" target="_blank">API docs ↗</a></p>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
